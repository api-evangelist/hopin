name: RingCentral Events
description: >-
  RingCentral Events (formerly Hopin) is a virtual and hybrid event management
  platform with REST APIs for managing organizations, events, sessions, stages,
  booths, registrations, attendees, tickets, reports, and data subscriptions.
  Acquired by RingCentral from Hopin in August 2023, the platform enables
  planning and producing engaging virtual, hybrid, and in-person event
  experiences. API access is available on the Enterprise plan.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Events
  - Virtual Events
  - Hybrid Events
  - Webinars
  - Event Management
  - Registration
  - Sessions
  - Networking
