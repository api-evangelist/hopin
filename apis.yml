apis:
  - name: RingCentral Events API
    description: >-
      The RingCentral Events External API provides programmatic access to
      manage organizations, events, sessions, stages, booths, registrations,
      tickets, magic links, reports, schedule items, tags, and data
      subscriptions. Authentication uses OAuth 2.0 with client credentials.
      API access is restricted to the Enterprise plan. The base URL is
      https://api.events.ringcentral.com.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.events.ringcentral.com/external-api
    baseURL: https://api.events.ringcentral.com
